[bar.default]
background_opacity = 0.099999997764825821
center = [ "date", "spacer_2", "clock" ]
end = [ "media", "tray", "notifications", "clipboard", "network", "bluetooth", "volume", "battery", "session" ]
margin_edge = 8
scale = 1.350000012665987
start = [ "launcher", "wallpaper", "workspaces", "cpu_usage", "cpu_temp", "memory" ]

    [bar.default.monitor.DP-1]
    enabled = false

[battery.device."/org/freedesktop/UPower/devices/battery_hidpp_battery_0"]
warning_threshold = 30

[brightness]
enable_ddcutil = true

[location]
address = "Denver, US"

[lockscreen_widgets]
enabled = false
schema_version = 1
widget_order = [ "lockscreen-login-box@DP-1", "lockscreen-login-box@DP-5" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    cx = 720.0
    cy = 2437.0
    output = "DP-1"
    rotation = 0.0
    scale = 1.0
    type = "login_box"

    [lockscreen_widgets.widget."lockscreen-login-box@DP-5"]
    cx = 1280.0
    cy = 1317.0
    output = "DP-5"
    rotation = 0.0
    scale = 1.0
    type = "login_box"

[shell]
corner_radius_scale = 1.3500000201165676
font_family = "Inter"
telemetry_enabled = false
ui_scale = 1.2500000111758709

    [shell.panel]
    session_placement = "centered"

    [shell.shadow]
    direction = "down_right"

[theme]
builtin = "Rosé Pine"
community_palette = "Vesper"
source = "community"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "alacritty", "gtk3", "gtk4", "kcolorscheme", "niri", "qt" ]

[wallpaper]
directory = "/home/browser/Pictures/Wallpapers"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/browser/Pictures/Wallpapers/wallhaven-57d3e7_2560x1440.png"

    [wallpaper.last]
    path = "/home/browser/Pictures/Wallpapers/wallhaven-57d3e7_2560x1440.png"

    [wallpaper.monitors.DP-1]
    path = "/home/browser/Pictures/Wallpapers/wallhaven-57d3e7_2560x1440.png"

    [wallpaper.monitors.DP-5]
    path = "/home/browser/Pictures/Wallpapers/wallhaven-57d3e7_2560x1440.png"

    [[wallpaper.favorite]]
    path = "/home/browser/Pictures/Wallpapers/wallhaven_gpr73d.jpg"
    theme_mode = "auto"

[widget.battery]
device = "/org/freedesktop/UPower/devices/battery_hidpp_battery_0"
display_mode = "graphic"

[widget.clock]
anchor = true
color = "on_surface_variant"

[widget.cpu_temp]
gauge_color = "secondary"
stat = "cpu_temp"
type = "sysmon"

[widget.cpu_usage]
type = "sysmon"

[widget.date]
color = "on_surface_variant"

[widget.gpu_temp]
stat = "gpu_temp"
type = "sysmon"

[widget.gpu_usage]
stat = "gpu_usage"
type = "sysmon"

[widget.media]
hide_when_no_media = true

[widget.memory]
stat = "ram_used"
type = "sysmon"

[widget.spacer_2]
type = "spacer"